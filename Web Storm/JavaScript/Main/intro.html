<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Basic Output Section -->
    <p id="demo"></p>
    <h1>HI</h1>
    <p id="person"></p>

    <!-- Login Form -->
    <form id="form_main">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"><br>

        <label for="password">Password</label>
        <input type="password" id="password" name="password"><br>

        <label for="contact">Contact</label>
        <input type="tel" id="contact" name="contact"><br>

        <input type="submit" value="Submit">
    </form>
    <br>

    <!-- Date and Time Button -->
    <button id="js_button" type="button">See Date and Time</button> <!-- FIXED: Added type="button" -->
    <p id="date_time"></p>
    <br>

    <!-- String Form -->
    <form id="string">
        <label for="first_name">Enter First Name</label>
        <input id="first_name" name="first_name" type="text">

        <label for="last_name">Enter Last Name</label>
        <input id="last_name" name="last_name" type="text">

        <input type="submit">
    </form>
    <p id="output"></p>

    <!-- Number Conversion -->
    <div id="number">
        <p id="number_add"></p>
    </div>

    <!-- Personalized Welcome -->
    <div>
        <h1 id="myH1">Welcome</h1><br>
        <label>Enter Username</label>
        <input type="text" id="user_text" placeholder="Enter your username" title="Username"><br><br> 
        <button id="mySubmit" type="button">Submit</button> <!-- FIXED: Added type="button" -->
    </div>
    <br>

    <!-- For-Loop Execution -->
    <div>
        <label>Enter a number</label>
        <input type="text" id="input_num"><br><br> 
        <button id="myForLoop" type="button">Submit</button> <!-- FIXED: Added type="button" -->
        <label>Result :</label>
        <p id="resultFor"></p>
    </div>
    <br>

    <!-- Counter Buttons -->
    <div id="countFunction">
        <label id="countLabel">0</label><br>
        <button id="increaseCount" class="buttonCount" type="button">Increase</button> <!-- FIXED -->
        <button id="resetCount" class="buttonCount" type="button">Reset</button> <!-- FIXED -->
        <button id="decreaseCount" class="buttonCount" type="button">Decrease</button> <!-- FIXED -->
    </div>
    <br>

    <!-- Random Number Generator -->
    <div id="random">
        <label id="label_random">Random Number Generator : </label>
        <button id="generate_random" type="button">Generate</button> <!-- FIXED -->
    </div>
    <br>

    <!-- Checkbox and Radio Buttons -->
    <div id="checkbox">
        <form id="subscriptionForm">
        <!-- Checkbox -->
        <label for="myCheckBox">Subscribe</label>
        <input type="checkbox" id="myCheckBox" name="subscribe">
        <br>

        <!-- Radio Buttons -->
        <fieldset>
            <legend>Payment method</legend>

            <label for="visaBtn">Visa</label>
            <input type="radio" id="visaBtn" name="payment" value="visa">
            <br>

            <label for="masterCardBtn">MasterCard</label>
            <input type="radio" id="masterCardBtn" name="payment" value="mastercard">
            <br>

            <label for="payPalBtn">PayPal</label>
            <input type="radio" id="payPalBtn" name="payment" value="paypal">
        </fieldset>
        <br>

        <!-- Reset Button -->
        <button type="reset" id="reset_checkbox" class="sp-button">Reset</button>
        <button type="submit" id="submit_checkbox" class="sp-button">Submit</button>
        </form>
    </div>

    <div id="messageBox"></div>
    <br>

    <button id="check_day" type="button">Check the Day</button> <!-- FIXED -->
    <div id="responseDiv"></div> <!-- This is where responses will be displayed -->

    <!-- Username Capitalizer-->
    <button id="username_enter" type="button">Useraname</button> <!-- FIXED -->

    <!-- Number Guessing Game -->
    <div>
        <label>Enter Your Guess (A Number Between 1-10) : </label>
        <input type="number" id="guess_number" min="1" max="10" placeholder="Enter a number 1–10">

        <!-- Submit Button -->
        <button type="button" id="guess_submit">submit</button> <!-- FIXED -->
    </div>
    <div id="guess_result"></div>

    <!-- Temperature Conversion Program -->
    <div id="temp_convert">
        <label id="tempLabel">Temperature Conversion Program</label>
        <input type="number" id="tempValue">
        
        <input type="radio" id="CtoF_Radio" name="RadioTemp">
        <label>Celsius -> Fahrenheit</label>

        <input type="radio" id="FtoC_Radio" name="RadioTemp">
        <label>Fahrenheit -> Celsius</label>

        <button type="button" id="tempSubmit">Submit</button> <!-- FIXED -->

        <div id="tempResult"></div>
    </div>

    <!--Dice Roller Program-->
    <div id="dice">
        <label id="dice_label">Dice Roller Program</label>
        <img src="../Images/dice-roll-dice.gif" alt="Dice GIF" id="dice_gif">
        <div id="DiceDiv">
            <button id="RollDice">Roll Dice</button>
            <input type="number" id="resultDice" readonly>
        </div>
        <div id="dice_images"></div>
    </div>

    <!--Random Password Generator-->

    <br>
    <div id="passwordGenerator">
        <label class="labelPassword">Random Password Generator.</label><br>
        <label id="labelPassword2">Enter the length of the character you need</label><br>
        <input type="number" id="lenPassword">
        <button type="submit" id="passwordButton">Submit</button>

        <div id="resultPasswordDiv"></div>
    </div>
    <br><br>
    <div class="math_wrapper">
        <div id="math_module">
            <div><p>Math Modules</p></div>
            <div><label>Enter your Radius :</label></div>
            <div><input type="number" id="radius_input" placeholder="Enter Radius"></div>
            <br>
            <div id="area_result"></div>
            <div id="circumference_result"></div>
            <div id="volume_result"></div>
        </div>
    </div>
    <br><br>
    <div id="element_selector"> 
        
    </div>


<script type="module" src="main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script src="main.js"></script>
<body>
    <div id="main">
        <label id="label_main">TO-DO List 📝</label>
        <div class="task-bar">
            <input type="text" placeholder="Add your task" id="user_text">
            <button id="button_event">Add</button>
        </div>
        <div id="tasks">
            <div id="task1">
                <ul>
                    <li>Task 1: <p id="note1"></p><input type="checkbox" id="check1"></li>
                </ul>
            </div>
            <div id="task2">
                <ul>
                    <li>Task 2: <p id="note2"></p><input type="checkbox" id="check2"></li>
                </ul>
            </div>
            <div id="task3">
                <ul>
                    <li>Task 3: <p id="note3"></p><input type="checkbox" id="check3"></li>
                </ul>
            </div>
            <div id="taskerror">
                <p id="noteerror"></p>
            </div>
        </div>
    </div>
</body>
</html>

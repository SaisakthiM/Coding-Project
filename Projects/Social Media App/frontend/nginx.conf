resolver 127.0.0.11 valid=30s ipv6=off;  # Docker's internal DNS

server {
    listen 80;

    # Serve Frontend SPA
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Django GraphQL
    location /graphql/ {
        set $django_upstream http://django:8000;
        proxy_pass $django_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout settings for GraphQL
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Java Microservice
    location /api/java/ {
        set $java_upstream http://microservice-java:8080;
        proxy_pass $java_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Go Microservice
    location /api/go/ {
        set $go_upstream http://microservice-go:8080;
        proxy_pass $go_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Media Storage (MinIO) Access
    location /media/ {
        set $minio_upstream http://minio:9000;
        proxy_pass $minio_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # MinIO specific headers
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 100M;  # Adjust based on your needs
    }
}
services:
  db:
    image: postgres:15
    container_name: socialmediaapp-db
    environment:
      POSTGRES_DB: socialmediaapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: socialmediaapp-backend
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=socialmediaapp
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: ["/wait-for-db.sh"]  # or your usual backend start command

  frontend:
    build: ./frontend
    container_name: socialmediaapp-frontend
    ports:
      - "5173:5173"    # Vite dev server port
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: ["npm", "run", "dev", "--", "--host"]  # ensure Vite binds to 0.0.0.0

volumes:
  db_data:

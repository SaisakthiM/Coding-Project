services:

  # --- Backend Services ---
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: socialmediaapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend-net

  cassandra:
    image: cassandra:4
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - backend-net

  redis:
    image: redis:7
    networks:
      - backend-net

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:$(cat /run/secrets/postgres_password)@db:5432/socialmediaapp
    depends_on:
      - db
      - cassandra
      - redis
    networks:
      - backend-net

  # --- Messaging Services ---
  zookeeper:
    image: wurstmeister/zookeeper
    networks:
      - message-net

  kafka:
    image: wurstmeister/kafka
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    networks:
      - message-net

  # --- Frontend Services ---
  frontend-dev:
    build: ./frontend
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - frontend-net

  frontend-prod:
    build: ./frontend
    command: nginx -g 'daemon off;'
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - frontend-net

  # --- Microservices ---
  microservice-java:
    build: ./microservice-java/sai-java
    depends_on:
      - kafka
      - db
    networks:
      - backend-net

  microservice-go:
    build: ./microservice-go
    depends_on:
      - kafka
      - redis
    networks:
      - backend-net

  # --- Observability ---
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend-net

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - backend-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    ports:
      - "9200:9200"
    networks:
      - backend-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    ports:
      - "5601:5601"
    networks:
      - backend-net

  jaeger:
    image: jaegertracing/all-in-one:1.49
    ports:
      - "16686:16686"
    networks:
      - backend-net

# --- Volumes ---
volumes:
  db_data:
  cassandra_data:

# --- Secrets ---
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

# --- Networks ---
networks:
  frontend-net:
  backend-net:
  message-net:

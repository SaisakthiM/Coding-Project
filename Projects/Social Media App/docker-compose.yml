services:

  # --- Reverse Proxy ---
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend-prod
      - django
      - microservice-java
      - microservice-go
      - minio
    networks:
      - backend-net
      - frontend-net

  # --- Frontend Production ---
  frontend-prod:
    build:
      context: ./frontend
      target: prod
    networks:
      - frontend-net

  # --- Frontend Development (Vite / HMR) ---
  frontend-dev:
    build:
      context: ./frontend
      target: dev
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - django
      - microservice-java
      - microservice-go
    networks:
      - frontend-net
      - backend-net

  # --- Backend (Django + Postgres) ---
  django:
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:example@postgres:5432/socialmediaapp
      MEDIA_STORAGE_URL: http://minio:9000
      MEDIA_STORAGE_KEY: minio
      MEDIA_STORAGE_SECRET: minio123
    depends_on:
      - postgres
      - minio
    networks:
      - backend-net

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: socialmediaapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend-net

    # --- Java Microservice + Cassandra ---
  cassandra:
    image: cassandra:4
    container_name: cassandra
    ports:
      - "9042:9042"   # expose Cassandra to host if needed
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - backend-net

  microservice-java:
    build: ./microservice-java
    container_name: microservice-java
    ports:
      - "8080:8080"   # expose Spring Boot port
    environment:
      SPRING_CASSANDRA_CONTACT-POINTS: cassandra
      SPRING_CASSANDRA_PORT: 9042
      SPRING_CASSANDRA_LOCAL-DATACENTER: datacenter1
    depends_on:
      - cassandra
      - kafka
    networks:
      - backend-net
    volumes:
      - ./microservice-java/.m2:/root/.m2        # Maven cache
      - ./microservice-java/target:/app/target   # share build output
      - ./microservice-java/wait-for-cassandra.sh:/wait-for-cassandra.sh


  # --- Go Microservice + Redis ---
  redis:
    image: redis:7
    container_name: redis
    networks:
      - backend-net

  microservice-go:
    build: ./microservice-go
    container_name: microservice-go
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:                        # <- This is per-service mount
      - ./microservice-go:/app      # bind mount: local code → container
      - go_cache:/go/pkg/mod        # named volume for Go module cache
    networks:
      - backend-net


  # --- Messaging ---
  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    networks:
      - backend-net

  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    networks:
      - backend-net

  # --- Media Storage (MinIO) ---
  minio:
    image: minio/minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    networks:
      - backend-net

  # --- Observability Stack ---
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - backend-net
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - backend-net
    volumes:
      - grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - backend-net
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yml

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./observability/promtail-config.yml:/etc/promtail/config.yml
    networks:
      - backend-net
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    ports:
      - "3200:3200"
    networks:
      - backend-net
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo/config.yml

# --- Volumes ---
volumes:
  db_data:
  cassandra_data:
  grafana_data:
  minio_data:
  go_cache:

# --- Networks ---
networks:
  backend-net:
  frontend-net:

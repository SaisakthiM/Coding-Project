version: "3.9"

services:

  # -------- Django Backend --------
  django:
    build: ./backend
    container_name: django
    environment:
      DATABASE_URL: postgres://postgres:saisakthi2008@postgres:5432/socialmediaapp
      MEDIA_STORAGE_URL: http://minio:9000
      MEDIA_STORAGE_KEY: minio
      MEDIA_STORAGE_SECRET: minio123
    depends_on:
      - postgres
      - minio
    networks:
      - backend-net

  # -------- Postgres DB --------
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: socialmediaapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: saisakthi2008
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  # -------- Frontend Production --------
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      target: prod
    container_name: frontend-prod
    networks:
      - frontend-net
    expose:
      - "80"

  # -------- Frontend Dev (Vite/HMR) --------
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend-dev
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - django
    networks:
      - frontend-net
      - backend-net

  # -------- Nginx Reverse Proxy --------
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - frontend-prod
      - django
      - microservice-java
      - microservice-go
      - minio
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend-net
      - frontend-net

  # -------- Java Microservice + Cassandra --------
  cassandra:
    image: cassandra:4
    container_name: cassandra
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - backend-net

  microservice-java:
    build: ./microservice-java
    container_name: microservice-java
    ports:
      - "8081:8080"  # Avoid conflict; container 8080 exposed on host 8081
    environment:
      SPRING_CASSANDRA_CONTACT-POINTS: cassandra
      SPRING_CASSANDRA_PORT: 9042
      SPRING_CASSANDRA_LOCAL-DATACENTER: datacenter1
    depends_on:
      - cassandra
      - kafka
    networks:
      - backend-net
    volumes:
      - ./microservice-java/.m2:/root/.m2
      - ./microservice-java/target:/app/target

  # -------- Go Microservice + Redis --------
  redis:
    image: redis:7
    container_name: redis
    networks:
      - backend-net

  microservice-go:
    build: ./microservice-go
    container_name: microservice-go
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - backend-net
    volumes:
      - go_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build

  # -------- Kafka & Zookeeper --------
  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    networks:
      - backend-net

  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    depends_on:
      - zookeeper
    networks:
      - backend-net

  # -------- Media Storage (MinIO) --------
  minio:
    build: ./minio
    container_name: minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend-net

  # -------- Observability --------
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend-net

  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yml
    networks:
      - backend-net

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./observability/promtail-config.yml:/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - backend-net

  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    ports:
      - "3200:3200"
    environment:
      TEMPO_STORAGE: "none" # Disable default backend to avoid unknown backend error
    volumes:
      - ./observability/tempo-config.yml:/etc/tempo/config.yml
    networks:
      - backend-net

volumes:
  db_data:
  cassandra_data:
  grafana_data:
  minio_data:
  go_cache:
  go_build_cache:

networks:
  backend-net:
  frontend-net:

global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'microservice-go'
    static_configs:
      - targets: ['microservice-go:8080']

  - job_name: 'microservice-java'
    static_configs:
      - targets: ['microservice-java:8080']

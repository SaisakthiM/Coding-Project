server {
    listen 80;

    # -----------------------------
    # Hospital Management (Django)
    # -----------------------------
    location /hospital/ {
        proxy_pass http://hospital-management:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -----------------------------
    # Blog Website (Django)
    # -----------------------------
    location /blog/ {
        proxy_pass http://blog-website:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -----------------------------
    # Quiz App (Vite)
    # -----------------------------
    location /quiz/ {
        proxy_pass http://quiz-app:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # -----------------------------
    # Bank Manager Backend (Spring)
    # -----------------------------
    location /bank/api/ {
        proxy_pass http://bank-manager-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -----------------------------
    # Bank Manager Frontend (Vite)
    # -----------------------------
    location /bank/ {
        proxy_pass http://bank-manager-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # -----------------------------
    # Notes Backend (Django)
    # -----------------------------
    location /notes/api/ {
        proxy_pass http://notes-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -----------------------------
    # Notes Frontend (Vite)
    # -----------------------------
    location /notes/ {
        proxy_pass http://notes-frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # -----------------------------
    # Video Backend (Django)
    # -----------------------------
    location /video/api/ {
        proxy_pass http://video-uploader-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -----------------------------
    # Video Frontend (Vite)
    # -----------------------------
    location /video/ {
        proxy_pass http://video-uploader-frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # -----------------------------
    # Default route
    # -----------------------------
    location / {
        return 404;
    }
}
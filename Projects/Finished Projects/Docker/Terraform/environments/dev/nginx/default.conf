server {
    listen 80;
    client_max_body_size 1000M;
    server_name localhost;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # ─── NOTES ───────────────────────────────────────────────
    location /notes/api/ {
        set $upstream http://notes-backend:8000;
        proxy_pass $upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /notes/ {
        root /apps;
        try_files $uri $uri/ /notes/index.html;
    }

    # ─── BANK ────────────────────────────────────────────────
    location /bank/api/ {
        set $upstream http://bank-backend:8080;
        proxy_pass $upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /bank/ {
        root /apps;
        try_files $uri $uri/ /bank/index.html;
    }

    # ─── QUIZ ────────────────────────────────────────────────
    location /quiz/ {
        root /apps;
        try_files $uri $uri/ /quiz/index.html;
    }

    # ─── VIDEO ───────────────────────────────────────────────
    location /video/api/ {
        set $upstream http://video-uploader-backend:8080;
        proxy_pass $upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /video/ {
        root /apps;
        try_files $uri $uri/ /video/index.html;
    }

    # ─── HOSPITAL ────────────────────────────────────────────
    # hospital/urls.py uses path('', include('hospital.urls'))
    # so strip /hospital/ prefix before sending
    location /hospital/ {
        set $upstream http://hospital-management:8000;
        proxy_pass $upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    # ─── BLOG ────────────────────────────────────────────────
    # blog urls start from / so strip /blog/ prefix
    location /blog/ {
        set $upstream http://blog-website:8000;
        proxy_pass $upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    # ─── SOCIAL MEDIA (kind cluster) ─────────────────────────
    location /social/ {
        set $upstream http://172.18.0.2:30080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    # ─── GATEWAY STATUS ──────────────────────────────────────
    location / {
        return 200 '{"status":"gateway running","apps":["/notes/","/bank/","/quiz/","/video/","/hospital/","/blog/","/social/"]}';
        add_header Content-Type application/json;
    }
}
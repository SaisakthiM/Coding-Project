server {
    listen 80;
    server_name localhost;

    # ─── NOTES ────────────────────────────────────────────────
    location /notes/api/ {
        proxy_pass http://notes-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /notes/ {
        root /apps;
        try_files $uri $uri/ /notes/index.html;
    }

    # ─── BANK ─────────────────────────────────────────────────
    location /bank/api/ {
        proxy_pass http://bank-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /bank/ {
        root /apps;
        try_files $uri $uri/ /bank/index.html;
    }

    # ─── QUIZ ─────────────────────────────────────────────────
    location /quiz/ {
        root /apps;
        try_files $uri $uri/ /quiz/index.html;
    }

    # ─── VIDEO ────────────────────────────────────────────────
    location /video/api/ {
        proxy_pass http://video-uploader-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /video/ {
        root /apps;
        try_files $uri $uri/ /video/index.html;
    }

    # ─── HOSPITAL ─────────────────────────────────────────────
    location /hospital/ {
        proxy_pass http://hospital-management:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── BLOG ─────────────────────────────────────────────────
    location /blog/ {
        proxy_pass http://blog-website:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── SOCIAL MEDIA (Kubernetes via kind) ───────────────────
    location /social/ {
        resolver 127.0.0.11 valid=30s;   # ← Docker's internal DNS
        set $social_upstream "social-media-control-plane:30080";
        proxy_pass http://$social_upstream/social/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API SERVICE ──────────────────────────────────────────
    location /api-service/api/ {
        proxy_pass http://api-service-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api-service/ {
        root /apps;
        try_files $uri $uri/ /api-service/index.html;
    }

    # ─── DOCUMENT INTELLIGENCE PLATFORM ──────────────────────
    location /document/api/ {
        proxy_pass http://doc-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /document/ {
        root /apps;
        try_files $uri $uri/ /document/index.html;
    }

    # ─── GATEWAY STATUS ───────────────────────────────────────
    location / {
        return 200 '{"status":"gateway running","apps":["/notes/","/bank/","/quiz/","/video/","/hospital/","/blog/","/social/","/api-service/","/document/"]}';
        add_header Content-Type application/json;
    }
}
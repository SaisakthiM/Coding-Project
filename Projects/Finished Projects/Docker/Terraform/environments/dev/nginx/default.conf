server {
    listen 80;
    listen [::]:80;
    server_name localhost saisakthi.qzz.io;
    client_max_body_size 1000M;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://static.cloudflareinsights.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:;" always;

    server_tokens off;
    resolver 127.0.0.11 valid=30s;

    # ─── NOTES ────────────────────────────────────────────────────
    location /notes/api/ {
        set $notes_backend "notes-backend:8000";
        rewrite ^/notes/api/(.*)$ /api/$1 break;
        proxy_pass http://$notes_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /notes/ {
        root /apps;
        try_files $uri $uri/ /notes/index.html;
    }

    # ─── BANK ─────────────────────────────────────────────────────
    location /bank/api/ {
        set $bank_backend "bank-backend:8080";
        rewrite ^/bank/api/(.*)$ /api/$1 break;
        proxy_pass http://$bank_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /bank/ {
        root /apps;
        try_files $uri $uri/ /bank/index.html;
    }

    # ─── QUIZ ─────────────────────────────────────────────────────
    location /quiz/ {
        root /apps;
        try_files $uri $uri/ /quiz/index.html;
    }

    # ─── VIDEO ────────────────────────────────────────────────────
    location /video/api/ {
        set $video_backend "video-uploader-backend:8080";
        rewrite ^/video/api/(.*)$ /$1 break;
        proxy_pass http://$video_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /video/ {
        root /apps;
        try_files $uri $uri/ /video/index.html;
    }

    # ─── HOSPITAL ─────────────────────────────────────────────────
    location /hospital/ {
        set $hospital_backend "hospital-management:8000";
        rewrite ^/hospital/(.*)$ /hospital/$1 break;
        proxy_pass http://$hospital_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    # ─── BLOG ─────────────────────────────────────────────────────
    location /blog/ {
        set $blog_backend "blog-website:8000";
        rewrite ^/blog/(.*)$ /blog/$1 break;
        proxy_pass http://$blog_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://static.cloudflareinsights.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:;" always;
    }

    location /accounts/login/ {
        return 302 /blog/login/;
    }

    location /accounts/logout/ {
        return 302 /blog/logout/;
    }

    # ─── BLOG MINIO ───────────────────────────────────────────────
    location /blog/minio/ {
        set $blog_minio "blog-minio:9000";
        rewrite ^/blog/minio/(.*)$ /$1 break;
        proxy_pass http://$blog_minio;
        proxy_set_header Host blog-minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 1000M;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── SOCIAL MEDIA (Kubernetes via kind) ───────────────────────
    location /social/ {
        set $social_upstream "social-media-control-plane:30080";
        proxy_pass http://$social_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        proxy_redirect off;

        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken";
            return 204;
        }
    }

    # ─── API SERVICE ──────────────────────────────────────────────
    location /api-service/api/ {
        set $api_service_backend "api-service-backend:8000";
        rewrite ^/api-service/api/(.*)$ /$1 break;
        proxy_pass http://$api_service_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
    }

    location /api-service/ {
        root /apps;
        try_files $uri $uri/ /api-service/index.html;
    }

    # ─── DOCUMENT INTELLIGENCE PLATFORM ──────────────────────────
    location /document/api/ {
        set $doc_backend "doc-backend:8000";
        rewrite ^/document/api/(.*)$ /$1 break;
        proxy_pass http://$doc_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /document/ {
        root /apps;
        try_files $uri $uri/ /document/index.html;
    }

    # ─── OBSERVABILITY ────────────────────────────────────────────
    # All UIs live in the kind cluster behind kind's ingress-nginx.
    # Gateway forwards /grafana/, /jaeger/, /otel/ → kind:30080.
    # kind's ingress-nginx handles sub-path rewriting from there.

    # Grafana — dashboards, logs, traces
    # FIX: added proxy_redirect off to prevent kind rewriting Location
    # headers back to internal cluster addresses.
    location /grafana/ {
        set $obs_upstream "social-media-control-plane:30080";
        proxy_pass http://$obs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_redirect off;

        # WebSocket support — required for Grafana live panels
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http:; connect-src 'self' ws: wss:;" always;
    }

    # Jaeger — trace search and flame graph
    # FIX: added proxy_redirect off; Jaeger handles /jaeger prefix
    # internally via --query.base-path=/jaeger so no rewriting needed here.
    location /jaeger/ {
        set $obs_upstream "social-media-control-plane:30080";
        proxy_pass http://$obs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        proxy_redirect off;

        # Jaeger UI uses fetch() for API calls — needs a relaxed CSP
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' http: https:;" always;
    }

    # OTEL Collector OTLP/HTTP — for browser-instrumented frontends
    # FIX: added proxy_redirect off
    location /otel/ {
        set $obs_upstream "social-media-control-plane:30080";
        proxy_pass http://$obs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 30s;
        proxy_redirect off;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, traceparent, tracestate" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, traceparent, tracestate";
            return 204;
        }
    }

    location /record/ {
        root /apps/record;
        try_files $uri $uri/ /record.html =404;
    }

    location /login {
        return 302 /social/login/;
    }

    location /register {
        return 302 /social/register/;
    }

    # ─── GATEWAY STATUS ───────────────────────────────────────────
    location / {
        root /apps/intro;
        try_files $uri $uri/ /intro/index.html =404;
    }
}

# ─── Internal :8080 — nginx_status for nginx-exporter only ───
server {
    listen 8080;
    server_name localhost;
    server_tokens off;

    location /nginx_status {
        stub_status on;
        access_log off;
        allow all;
    }

    location / {
        return 404;
    }
}
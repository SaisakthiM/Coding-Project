apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 65.5.1 # TODO: confirm against `helm search repo kube-prometheus-stack --versions` and pin deliberately
      helm:
        valueFiles:
          - $values/projects/platform/observability/prometheus.yml
          - $values/projects/platform/observability/grafana-values.yml
        values: |
          prometheus:
            prometheusSpec:
              enableRemoteWriteReceiver: true
              resources:
                requests: { cpu: 200m, memory: 512Mi }
                limits: { cpu: "1000m", memory: 2Gi }
    - repoURL: <YOUR_GIT_REPO_URL> # same monorepo as the other sources below
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

# Original Terraform had `lifecycle { ignore_changes = [values] }` to stop
# every `terraform apply` from re-triggering an upgrade. That problem goes
# away here: ArgoCD only re-syncs when this file (or prometheus.yml /
# grafana-values.yml) actually changes in git.

# ─────────────────────────────────────────────────────────────
# otel-collector-config.yml
#
# Full Helm values for open-telemetry/opentelemetry-collector.
# Deployed inside the kind cluster so it can reach Prometheus,
# Loki, and Tempo natively.
#
# Receives traces/metrics/logs from:
#   • Docker app backends (via gateway-net bridge)
#   • In-cluster k8s services
#
# Exports to:
#   • Prometheus   — OTLP metrics via remote-write
#   • Loki         — logs via loki exporter
#   • Tempo        — traces via OTLP gRPC
# ─────────────────────────────────────────────────────────────

mode: deployment          # single Deployment, not DaemonSet
file_format: MAJOR

replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib   # contrib has loki + prometheus exporters
  tag: "0.100.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Service: expose all receiver ports inside the cluster ─────
service:
  type: ClusterIP

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
  zipkin:
    enabled: true
    containerPort: 9411
    servicePort: 9411
    protocol: TCP

# ── ServiceMonitor so kube-prometheus-stack scrapes the collector itself ──
serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
      interval: 15s
  extraLabels:
    release: kube-prometheus-stack

# ── Core collector pipeline config ────────────────────────────
config:
  # ── RECEIVERS ─────────────────────────────────────────────
  receivers:
    # Accept OTLP from any instrumented service (gRPC + HTTP)
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
          cors:
            allowed_origins:
              - "http://*"
              - "https://*"

    # Accept Zipkin spans (legacy)
    zipkin:
      endpoint: "0.0.0.0:9411"

    # Pull Prometheus metrics from Docker-network services.
    # These resolve because the gateway container bridges
    # gateway-net ↔ kind network.
    prometheus:
      config:
        scrape_configs:

          # nginx stub_status exporter on gateway
          - job_name: gateway-nginx
            scrape_interval: 15s
            static_configs:
              - targets: ["gateway:9113"]
            relabel_configs:
              - target_label: app
                replacement: gateway

          # Django apps (django-prometheus exposes /metrics)
          - job_name: notes-backend
            scrape_interval: 15s
            metrics_path: /metrics
            static_configs:
              - targets: ["notes-backend:8000"]
            relabel_configs:
              - target_label: app
                replacement: notes-backend

          - job_name: blog-website
            scrape_interval: 15s
            metrics_path: /metrics
            static_configs:
              - targets: ["blog-website:8000"]
            relabel_configs:
              - target_label: app
                replacement: blog-website

          - job_name: hospital-management
            scrape_interval: 15s
            metrics_path: /metrics
            static_configs:
              - targets: ["hospital-management:8000"]
            relabel_configs:
              - target_label: app
                replacement: hospital-management

          - job_name: api-service-backend
            scrape_interval: 15s
            metrics_path: /metrics
            static_configs:
              - targets: ["api-service-backend:8000"]
            relabel_configs:
              - target_label: app
                replacement: api-service-backend

          - job_name: doc-backend
            scrape_interval: 15s
            metrics_path: /metrics
            static_configs:
              - targets: ["doc-backend:8000"]
            relabel_configs:
              - target_label: app
                replacement: doc-backend

          # Spring Boot Actuator
          - job_name: bank-backend
            scrape_interval: 15s
            metrics_path: /actuator/prometheus
            static_configs:
              - targets: ["bank-backend:8080"]
            relabel_configs:
              - target_label: app
                replacement: bank-backend

          # Go service
          - job_name: video-uploader-backend
            scrape_interval: 15s
            metrics_path: /metrics
            static_configs:
              - targets: ["video-uploader-backend:8080"]
            relabel_configs:
              - target_label: app
                replacement: video-uploader-backend

    # Collect own metrics
    prometheus/self:
      config:
        scrape_configs:
          - job_name: otel-collector
            scrape_interval: 15s
            static_configs:
              - targets: ["localhost:8888"]

  # ── PROCESSORS ────────────────────────────────────────────
  processors:
    # Memory safety — drop if collector itself is under pressure
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25

    # Batch for efficiency
    batch:
      send_batch_size: 1024
      timeout: 5s
      send_batch_max_size: 2048

    # Enrich every signal with k8s pod metadata
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.namespace.name
          - k8s.deployment.name
          - k8s.node.name
        labels:
          - tag_name: app
            key: app
            from: pod

    # Standardise resource attributes across all signals
    resource:
      attributes:
        - action: insert
          key: cluster
          value: kind-social-media

    # Transform: promote trace_id/span_id into log body labels
    # so Grafana can pivot from Loki → Tempo
    transform/logs:
      log_statements:
        - context: log
          statements:
            - set(attributes["trace_id"], trace_id.string) where trace_id != SpanID(0x0000000000000000)
            - set(attributes["span_id"],  span_id.string)  where span_id  != SpanID(0x0000000000000000)

  # ── EXPORTERS ─────────────────────────────────────────────
  exporters:
    # ── Traces → Tempo ──────────────────────────────────────
    otlp/tempo:
      endpoint: "tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true

    # ── Metrics → Prometheus (remote-write) ─────────────────
    prometheusremotewrite:
      endpoint: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      tls:
        insecure: true
      resource_to_telemetry_conversion:
        enabled: true

    # ── Logs → Loki ─────────────────────────────────────────
    loki:
      endpoint: "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
      tls:
        insecure: true
      # Map OTel resource attributes to Loki stream labels
      default_labels_enabled:
        exporter: false
        job: true
      resource_attributes_as_index_labels:
        - app
        - namespace
        - cluster
        - k8s.pod.name
        - service.name

    # ── Debug (disable in production) ───────────────────────
    debug:
      verbosity: basic
      sampling_initial: 5
      sampling_thereafter: 200

  # ── EXTENSIONS ────────────────────────────────────────────
  extensions:
    health_check:
      endpoint: "0.0.0.0:13133"
    pprof:
      endpoint: "0.0.0.0:1777"
    zpages:
      endpoint: "0.0.0.0:55679"

  # ── PIPELINES ─────────────────────────────────────────────
  service:
    extensions: [health_check, pprof, zpages]
    pipelines:
      # Traces: receive OTLP/Zipkin → enrich → send to Tempo
      traces:
        receivers:  [otlp, zipkin]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters:  [otlp/tempo]

      # Metrics: receive scraped + OTLP → send to Prometheus
      metrics:
        receivers:  [otlp, prometheus, prometheus/self]
        processors: [memory_limiter, resource, batch]
        exporters:  [prometheusremotewrite]

      # Logs: receive OTLP logs → inject trace IDs → send to Loki
      logs:
        receivers:  [otlp]
        processors: [memory_limiter, k8sattributes, resource, transform/logs, batch]
        exporters:  [loki]

# ── RBAC so k8sattributes can read pod metadata ───────────────
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources: ["replicasets"]
      verbs: ["get", "list", "watch"]

clusterRoleBinding:
  create: true

serviceAccount:
  create: true
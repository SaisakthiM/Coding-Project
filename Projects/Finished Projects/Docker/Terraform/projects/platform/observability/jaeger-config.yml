provisionDataStore:
  cassandra: false
  elasticsearch: false
  kafka: false

allInOne:
  enabled: true
  image:
    repository: jaegertracing/all-in-one
    tag: "1.57"
    pullPolicy: IfNotPresent

  args:
    - "--query.base-path=/jaeger"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  extraEnv:
    - name: SPAN_STORAGE_TYPE
      value: memory
    - name: MEMORY_MAX_TRACES
      value: "50000"
    - name: COLLECTOR_OTLP_ENABLED
      value: "true"

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      # FIX: don't strip /jaeger prefix — Jaeger handles it internally
      # via --query.base-path=/jaeger. Just pass the full path through.
      nginx.ingress.kubernetes.io/rewrite-target: /$1
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - localhost
      - saisakthi.qzz.io
    # FIX: paths is a sibling of hosts, not nested under it
    paths:
      - path: /jaeger(/?.*)
        pathType: ImplementationSpecific

collector:
  enabled: false
query:
  enabled: false
agent:
  enabled: false

service:
  type: ClusterIP

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
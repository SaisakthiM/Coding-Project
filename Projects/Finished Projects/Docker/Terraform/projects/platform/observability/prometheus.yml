
prometheus:
  prometheusSpec:
    additionalScrapeConfigs:
      # ── 1. Kind-side OTEL Collector self-metrics ─────────────
      - job_name: otel-collector-kind
        scrape_interval: 15s
        static_configs:
          - targets: ["otel-collector.monitoring.svc.cluster.local:8888"]
        relabel_configs:
          - target_label: app
            replacement: otel-collector-kind
          - target_label: cluster
            replacement: kind

      # ── 2. Jaeger self-metrics ───────────────────────────────
      - job_name: jaeger
        scrape_interval: 15s
        static_configs:
          - targets: ["jaeger-all-in-one.monitoring.svc.cluster.local:14269"]
        relabel_configs:
          - target_label: app
            replacement: jaeger
          - target_label: cluster
            replacement: kind

      # ── 3. Kubernetes cAdvisor ───────────────────────────────
      - job_name: kubernetes-cadvisor
        scrape_interval: 30s
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

# ── 10. Social Media — Django backend (k8s) ──────────────────
- job_name: social-backend
  scrape_interval: 15s
  metrics_path: /metrics
  kubernetes_sd_configs:
    - role: pod
      namespaces:
        names: [default]
  relabel_configs:
    - source_labels: [__meta_kubernetes_pod_label_app]
      regex: backend
      action: keep
    - source_labels: [__meta_kubernetes_pod_name]
      target_label: pod
    - target_label: app
      replacement: social-backend

# ── 11. Social Media — Go microservice (k8s) ─────────────────
- job_name: social-microservice-go
  scrape_interval: 15s
  metrics_path: /metrics
  kubernetes_sd_configs:
    - role: pod
      namespaces:
        names: [default]
  relabel_configs:
    - source_labels: [__meta_kubernetes_pod_label_app]
      regex: microservice-go
      action: keep
    - source_labels: [__meta_kubernetes_pod_name]
      target_label: pod
    - target_label: app
      replacement: social-go

# ── 12. Social Media — Java microservice (Spring Boot, k8s) ──
- job_name: social-microservice-java
  scrape_interval: 15s
  metrics_path: /actuator/prometheus
  kubernetes_sd_configs:
    - role: pod
      namespaces:
        names: [default]
  relabel_configs:
    - source_labels: [__meta_kubernetes_pod_label_app]
      regex: microservice-java
      action: keep
    - source_labels: [__meta_kubernetes_pod_name]
      target_label: pod
    - target_label: app
      replacement: social-java

# ── 13. Redis (standalone, inside kind) ──────────────────────
# redis-exporter runs as a sidecar or deployment beside Redis.
- job_name: redis
  scrape_interval: 15s
  static_configs:
    - targets:
        - redis-exporter:9121
  relabel_configs:
    - target_label: app
      replacement: redis

# ── 14. MinIO (social-media, k8s) ────────────────────────────
- job_name: minio-social
  scrape_interval: 30s
  metrics_path: /minio/v2/metrics/cluster
  static_configs:
    - targets:
        - minio:9000
  relabel_configs:
    - target_label: app
      replacement: minio-social

# ── 15. Kubernetes nodes (kube-prometheus-stack already adds
#        node-exporter, but this job exposes raw cAdvisor) ────
- job_name: kubernetes-cadvisor
  scrape_interval: 30s
  scheme: https
  tls_config:
    ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    insecure_skip_verify: true
  bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
  kubernetes_sd_configs:
    - role: node
  relabel_configs:
    - action: labelmap
      regex: __meta_kubernetes_node_label_(.+)
    - target_label: __address__
      replacement: kubernetes.default.svc:443
    - source_labels: [__meta_kubernetes_node_name]
      regex: (.+)
      target_label: __metrics_path__
      replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
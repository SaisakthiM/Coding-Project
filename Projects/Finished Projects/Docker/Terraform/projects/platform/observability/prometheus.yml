# ─────────────────────────────────────────────────────────────
# prometheus.yml  — additionalScrapeConfigs for kube-prometheus-stack
#
# This file is loaded via:
#   additionalScrapeConfigs = yamldecode(file("…/prometheus.yml"))
# so the root is a LIST of job objects, not a full prometheus config.
# ─────────────────────────────────────────────────────────────

# ── 1. OpenTelemetry Collector (exposes its own /metrics) ────
- job_name: otel-collector
  scrape_interval: 15s
  static_configs:
    - targets:
        - otel-collector:8888   # collector self-metrics inside kind network
  relabel_configs:
    - source_labels: [__address__]
      target_label: instance

# ── 2. Docker gateway — nginx ────────────────────────────────
# nginx-prometheus-exporter must run as a sidecar or separate
# container exposing /stub_status on port 9113.
- job_name: gateway-nginx
  scrape_interval: 15s
  static_configs:
    - targets:
        - gateway:9113
  relabel_configs:
    - target_label: app
      replacement: gateway

# ── 3. Notes App backend (Django / DRF) ──────────────────────
# Add django-prometheus to the app; it exposes /metrics on the
# same port as the app (8000).
- job_name: notes-backend
  scrape_interval: 15s
  metrics_path: /metrics
  static_configs:
    - targets:
        - notes-backend:8000
  relabel_configs:
    - target_label: app
      replacement: notes-backend

# ── 4. Bank backend (Spring Boot Actuator) ───────────────────
# application.yml: management.endpoints.web.exposure.include=prometheus
- job_name: bank-backend
  scrape_interval: 15s
  metrics_path: /actuator/prometheus
  static_configs:
    - targets:
        - bank-backend:8080
  relabel_configs:
    - target_label: app
      replacement: bank-backend


# tempo-config.yml — grafana/tempo (SINGLE BINARY chart)
# Use: helm upgrade tempo grafana/tempo -n monitoring -f tempo-config.yml

tempo:
  reportingEnabled: false

  # ── All Tempo config goes under tempo.config (rendered as tempo.yaml) ──
  config: |
    multitenancy_enabled: false

    server:
      http_listen_port: 3200
      log_level: info

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"
        jaeger:
          protocols:
            thrift_http:
              endpoint: "0.0.0.0:14268"
            grpc:
              endpoint: "0.0.0.0:14250"

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 336h

    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: kind-social-media
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090/api/v1/write
            send_exemplars: true
      processor:
        service_graphs:
          dimensions:
            - http.method
            - http.status_code
            - service.name
        span_metrics:
          dimensions:
            - http.method
            - http.status_code
            - http.route
            - service.name

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    querier:
      max_concurrent_queries: 10

    overrides:
      metrics_generator_processors:
        - service-graphs
        - span-metrics

persistence:
  enabled: true
  storageClassName: standard
  size: 5Gi

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

serviceMonitor:
  enabled: true
  additionalLabels:
    release: kube-prometheus-stack
  interval: 30s
# otel-collector-values.yml — kind-side OTEL Collector
# Receives OTLP from apps/gateway, enriches with k8s metadata,
# forwards to Prometheus, Loki, and Tempo.

mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: ""

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
  zipkin:
    enabled: true
    containerPort: 9411
    servicePort: 9411
    protocol: TCP
  prometheus:
    enabled: true
    containerPort: 8889
    servicePort: 8889
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"
          cors:
            allowed_origins: ["*"]

    # FIX: Removed docker service targets (notes-backend, bank-backend, etc.)
    # Those are Docker containers on the host network — unreachable from inside kind.
    # They are scraped by the otel-gateway Docker container instead.
    # This receiver now only scrapes the collector's own self-metrics.
    prometheus:
      config:
        scrape_configs:
          - job_name: otel-collector-self
            scrape_interval: 15s
            static_configs:
              - targets: ["localhost:8888"]

    # hostmetrics runs inside a container — it reflects container-level
    # metrics only, not the full node. Kept for basic process/memory insight.
    hostmetrics:
      collection_interval: 30s
      scrapers:
        cpu: {}
        memory: {}
        disk: {}
        filesystem: {}
        network: {}
        load: {}
        processes: {}

    k8s_cluster:
      collection_interval: 30s

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
      send_batch_max_size: 2048

    filter/drop_health:
      error_mode: ignore
      traces:
        span:
          - 'attributes["http.route"] == "/health"'
          - 'attributes["http.route"] == "/healthz"'
          - 'attributes["http.route"] == "/actuator/health"'
          - 'attributes["http.route"] == "/metrics"'
      metrics:
        metric:
          # FIX: =~ is not valid OTTL — use IsMatch() for regex
          - 'name == "up" and IsMatch(resource.attributes["job"], ".*health.*")'

    k8sattributes:
      auth_type: serviceAccount
      passthrough: false

    resource:
      attributes:
        - key: cluster
          value: kind-social-media
          action: insert
        - key: environment
          value: local
          action: insert

    memory_limiter:
      check_interval: 5s
      limit_mib: 400
      spike_limit_mib: 100

  exporters:
    prometheusremotewrite:
      endpoint: http://kube-prometheus-stack-prometheus.monitoring.svc:9090/api/v1/write
      tls:
        insecure: true
      resource_to_telemetry_conversion:
        enabled: true

    otlphttp/loki:
      endpoint: http://loki-gateway.monitoring.svc.cluster.local/otlp
      tls:
        insecure: true

    otlp/tempo:
      endpoint: tempo.monitoring.svc:4317
      tls:
        insecure: true
      compression: gzip

    debug:
      verbosity: basic
      sampling_initial: 5
      sampling_thereafter: 200

  service:
    telemetry:
      logs:
        level: info
      # FIX: metrics.address is deprecated and removed in newer collector versions.
      # Use readers with a pull exporter instead.
      metrics:
        level: detailed
        readers:
          - pull:
              exporter:
                prometheus:
                  host: "0.0.0.0"
                  port: 8888

    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, filter/drop_health, batch]
        exporters: [otlp/tempo]

      metrics:
        receivers: [otlp, prometheus, hostmetrics, k8s_cluster]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [prometheusremotewrite]

      logs:
        receivers: [otlp]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlphttp/loki]

# FIX: Added full RBAC rules required by k8sattributes processor
# and k8s_cluster receiver — default ClusterRole is too restrictive.
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources:
        - pods
        - namespaces
        - nodes
        - services
        - endpoints
        - replicationcontrollers
      verbs: ["get", "list", "watch"]
    - apiGroups: ["apps"]
      resources:
        - deployments
        - replicasets
        - statefulsets
        - daemonsets
      verbs: ["get", "list", "watch"]
    - apiGroups: ["batch"]
      resources:
        - jobs
        - cronjobs
      verbs: ["get", "list", "watch"]

serviceAccount:
  create: true

extraEnvs:
  - name: KUBE_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

serviceMonitor:
  enabled: true
  metricsEndpoints:
    - port: metrics
      interval: 30s
  extraLabels:
    release: kube-prometheus-stack
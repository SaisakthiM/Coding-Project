replicaCount: 1

image:
  repository: cassandra
  tag: "5.0"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: 1000m
    memory: 1Gi

jvm:
  maxHeapSize: 512M
  newHeapSize: 128M

persistence:
  enabled: false

readinessProbe:
  initialDelaySeconds: 90

livenessProbe:
  initialDelaySeconds: 90

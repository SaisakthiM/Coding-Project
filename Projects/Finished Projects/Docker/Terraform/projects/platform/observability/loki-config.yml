# ─────────────────────────────────────────────────────────────
# loki-config.yml  — Helm values for grafana/loki
#
# Deployed via:
#   helm_release "loki" { values = [file("…/loki-config.yml")] }
#
# Designed for a local kind cluster (single-node, no object
# storage required).  Uses filesystem backend with a 30-day
# retention window.
# ─────────────────────────────────────────────────────────────

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  limits_config:
    # How long to keep logs
    retention_period: 720h      # 30 days
    # Allow out-of-order log ingestion (Docker timestamps can drift)
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    # Enable structured metadata so OTel trace_id links work
    allow_structured_metadata: true
    # Volume endpoint used by Grafana's log volume panel
    volume_enabled: true

  server:
    http_listen_port: 3100
    grpc_listen_port: 9095
    log_level: info

  storage:
    type: filesystem

  schema_config:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage_config:
    tsdb_shipper:
      active_index_directory: /var/loki/index
      cache_location: /var/loki/index_cache
    filesystem:
      directory: /var/loki/chunks

  compactor:
    working_directory: /var/loki/compactor
    delete_request_store: filesystem
    retention_enabled: true

  query_range:
    results_cache:
      cache:
        embedded_cache:
          enabled: true
          max_size_mb: 100

  ruler:
    storage:
      type: local
      local:
        directory: /var/loki/rules
    rule_path: /var/loki/rules-temp

# ── Deployment mode ──────────────────────────────────────────
# SingleBinary is the simplest mode for a dev/local cluster.
# All Loki components run in one pod.
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    storageClass: standard    # kind's default StorageClass
    size: 5Gi

# ── Disable components not needed in SingleBinary mode ───────
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# ── Gateway (nginx in front of Loki) ─────────────────────────
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

# ── Monitoring (self-metrics scraped by Prometheus) ──────────
monitoring:
  selfMonitoring:
    enabled: false      # avoid circular dependency during first deploy
  lokiCanary:
    enabled: false
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack

# ── Test pod (disable to keep cluster lean) ──────────────────
test:
  enabled: false
events {}

http {
    server {
        listen 80;

        # React frontend
        location / {
            root /usr/share/nginx/html;  # frontend build folder
            index index.html;
            try_files $uri /index.html;
        }

        # Django backend
        location /api/ {
            proxy_pass http://notes-backend:8000/;  # backend service name in docker-compose
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}

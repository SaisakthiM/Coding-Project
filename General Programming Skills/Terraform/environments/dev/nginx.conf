server {
    listen 80;

    # Hospital Management (Django)
    location /hospital/ {
        proxy_pass http://hospital_management:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Notes Frontend (React / Vite)
    location /notes/ {
        proxy_pass http://notes_frontend:5173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Quiz App (React / Vite)
    location /quiz/ {
        proxy_pass http://quiz-app:5173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Time Clock (NGINX container)
    location /timeclock/ {
        proxy_pass http://time-clock:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Default root: 404 for any unknown route
    location / {
        return 404;
    }
}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Items</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>
    <header class="bg-green-600 text-white p-4">
        <h1 class="text-2xl font-bold">Sell Items</h1>
    </header>
    <main class="container mx-auto mt-8">
        <h2 class="text-xl font-semibold">Sell Items from Inventory</h2>
        <form action="#" method="POST" class="mt-4">
            <div class="mb-4">
                <label class="block mb-2">Item Name</label>
                <input type="text" name="item_name" class="w-full border rounded px-3 py-2">
            </div>
            <div class="mb-4">
                <label class="block mb-2">Quantity</label>
                <input type="number" name="quantity" class="w-full border rounded px-3 py-2">
            </div>
            <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-700">Sell</button>
        </form>
    </main>
</body>
</html>
